services:
  # Web Service
  - type: web
    name: sclera-collab
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && sleep 10
    startCommand: gunicorn --workers 2 --bind 0.0.0.0:$PORT --timeout 120 collab:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: REDIS_URL
        value: ${sclera-collab-redis}
    autoDeploy: true
    
  # Redis Service (for caching)
  - type: redis
    name: sclera-collab-redis
    plan: free
