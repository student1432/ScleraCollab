services:
  # Web Service
  - type: web
    name: sclera-collab
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT collab:app
    healthCheck:
      enabled: true
      path: /favicon.ico
      intervalSeconds: 30
      timeoutSeconds: 10
      gracePeriodSeconds: 60
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.9.16
      - key: SECRET_KEY
        generateValue: true
      - key: FIREBASE_WEB_API_KEY
        value: AIzaSyClZdRrPYznaCm-s0xEv3rfJWNnbPSy8Xk
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        generateValue: true
    autoDeploy: true
    
  # Redis Service (for caching)
  - type: redis
    name: sclera-collab-redis
    plan: free
    envVars:
      - key: REDIS_URL
        value: rediss://:funky-oarfish-66348.upstash.io:6380
