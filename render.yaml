services:
  # Web Service
  - type: web
    name: sclera-collab
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class threads -w 1 --bind 0.0.0.0:$PORT collab:app
    healthCheck:
      enabled: true
      path: /favicon.ico
      intervalSeconds: 30
      timeoutSeconds: 10
      gracePeriodSeconds: 60
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.9
      - key: SECRET_KEY
        generateValue: true
      - key: FIREBASE_WEB_API_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_PATH
        value: ./serviceAccountKey.json
    autoDeploy: true
    
  # Redis Service (for caching)
  - type: redis
    name: sclera-collab-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru
