services:
  # Web Service
  - type: web
    name: sclera-collab
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && sleep 10
    startCommand: gunicorn --bind 0.0.0.0:$PORT collab:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.9.16
      - key: SECRET_KEY
        generateValue: true
      - key: FIREBASE_WEB_API_KEY
        value: AIzaSyClZdRrPYznaCm-s0xEv3rfJWNnbPSy8Xk
      - key: FIREBASE_SERVICE_ACCOUNT_PATH
        value: ./serviceAccountKey.json
      - key: REDIS_URL
        value: ${sclera-collab-redis}
    autoDeploy: true
    
  # Redis Service (for caching)
  - type: redis
    name: sclera-collab-redis
    plan: free
