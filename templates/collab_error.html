{% extends "collab_base.html" %}

{% block title %}Error {{ code }} - ScleraCollab{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 py-16 text-center">
  <div class="mb-8">
    <h1 class="text-6xl font-bold text-[#22c55e] mb-4">{{ code }}</h1>
    <h2 class="text-2xl font-semibold text-white mb-4">{{ msg }}</h2>
    <p class="text-gray-400 mb-8">Sorry, something went wrong. Please try again or contact support if the problem persists.</p>
  </div>
  
  <div class="space-x-4">
    <a href="{{ url_for('dashboard') }}" class="inline-flex items-center px-6 py-3 bg-[#22c55e] hover:bg-[#2ea844] text-white rounded-lg transition-colors">
      <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
      </svg>
      Go Home
    </a>
    <button onclick="history.back()" class="inline-flex items-center px-6 py-3 bg-[#2a2a2a] hover:bg-[#333] text-white rounded-lg transition-colors">
      <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
      </svg>
      Go Back
    </button>
  </div>
</div>
{% endblock %}
